name: Clojure CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '25'

    - uses: DeLaGuardo/setup-clojure@13
      with:
        lein: latest

    - name: Install Emacs
      run: sudo apt-get update && sudo apt-get install -y emacs-nox

    - uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/project.clj') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Install dependencies
      run: lein deps

    - name: Run tests
      run: lein test-all
